name: Staging probe

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Install boxd CLI + grpcurl
        run: |
          curl -fsSL https://boxd.sh/downloads/cli/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          curl -fsSL -o /tmp/grpcurl.tar.gz https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_linux_x86_64.tar.gz
          tar -xzf /tmp/grpcurl.tar.gz -C /tmp grpcurl
          sudo mv /tmp/grpcurl /usr/local/bin/grpcurl
          grpcurl -version

      - name: Exchange API key for JWT
        env:
          BOXD_API_KEY: ${{ secrets.BOXD_API_KEY }}
        run: |
          set -e
          jwt=$(curl -fsSL -X POST https://boxd-stg.sh/api/v1/auth/token \
            -H 'Content-Type: application/json' \
            -d "{\"api_key\":\"$BOXD_API_KEY\"}" | jq -r .token)
          echo "::add-mask::$jwt"
          echo "BOXD_TOKEN=$jwt" >> "$GITHUB_ENV"

      - name: grpcurl list services (reflection over h2c)
        run: |
          set +e
          grpcurl -plaintext -max-time 10 boxd-stg.sh:9443 list 2>&1
          echo "exit=$?"

      - name: grpcurl list BoxdApi methods
        run: |
          set +e
          grpcurl -plaintext -max-time 10 boxd-stg.sh:9443 list boxd.api.v1.BoxdApi 2>&1
          echo "exit=$?"

      - name: grpcurl real RPC — ListVms (tests full auth'd call)
        run: |
          set +e
          grpcurl -plaintext -max-time 10 \
            -H "authorization: Bearer $BOXD_TOKEN" \
            -d '{}' \
            boxd-stg.sh:9443 boxd.api.v1.BoxdApi/ListVms 2>&1 | head -30
          echo "exit=$?"

      - name: boxd list — first try
        run: |
          set +e
          boxd --api-url https://boxd-stg.sh --token "$BOXD_TOKEN" list 2>&1
          echo "exit=$?"

      - name: boxd list — second try (is it a cold-start flake?)
        run: |
          set +e
          boxd --api-url https://boxd-stg.sh --token "$BOXD_TOKEN" list 2>&1
          echo "exit=$?"

      - name: boxd list — third try after a brief pause
        run: |
          set +e
          sleep 3
          boxd --api-url https://boxd-stg.sh --token "$BOXD_TOKEN" list 2>&1
          echo "exit=$?"
